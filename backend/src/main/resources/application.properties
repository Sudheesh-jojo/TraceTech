# Server
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tracetech}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FastAPI ML Service URL
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# OpenWeatherMap
weather.api.key=${WEATHER_API_KEY:}
weather.api.url=${WEATHER_API_URL:https://api.openweathermap.org/data/2.5/weather}
weather.city=${WEATHER_CITY:Chennai}

# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
