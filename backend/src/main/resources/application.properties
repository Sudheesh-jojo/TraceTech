# Server
server.port=8080

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tracetech}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rootsudheesh}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tracetech123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool ───────────────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Spring MVC: match trailing slashes (e.g. /api/inventory/ = /api/inventory) ─
spring.mvc.pathmatch.trailing-slash=true

# FastAPI ML Service URL
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# OpenWeatherMap
weather.api.key=${WEATHER_API_KEY:f8952584d57edfc96bcc4c208d8829be}
weather.api.url=https://api.openweathermap.org/data/2.5/weather
weather.city=${WEATHER_CITY:Chennai}

# JWT
jwt.secret=${JWT_SECRET:tracetechwashereanditwassecret2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── TraceTech Baseline Configuration ──────────────────────────────────────────
#
# Baseline over-prep % used to calculate "Without TraceTech" waste.
tracetech.baseline.overprep-pct=0.15

# Baseline forecast accuracy before TraceTech was deployed.
tracetech.baseline.forecast-accuracy-pct=60.0

# ── Supply Chain Defaults ─────────────────────────────────────────────────────

# Default temperature (°C) when no weather data is available
tracetech.default.temperature=34.0

# Default waste percentage assumption for estimatedCostIfOver calculation
tracetech.default.waste-pct=0.10

# Semester start months and max weeks (for week_of_semester feature)
tracetech.semester.odd-start-month=9
tracetech.semester.even-start-month=2
tracetech.semester.max-weeks=20

# Fallback forecast variance (± around baseDailyQty) when ML service is down
tracetech.fallback.variance=0.10
tracetech.fallback.range-pct=0.12

# Default days_until_exam when no exam is found in AcademicCalendar
tracetech.default.days-until-exam=30

# Procurement defaults when no supplier is configured for an ingredient
tracetech.procurement.default-cost=50.00
tracetech.procurement.default-supplier=Local market

# Production plan — max units sentinel when no recipe constraint exists
tracetech.production.unconstrained-max=9999

# Accuracy verdict threshold — predictions within this % are classified ACCURATE
tracetech.accuracy.threshold-pct=5